name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Build macOS
        run: |
          xcodebuild \
            -project CFApp.xcodeproj \
            -scheme CFApp \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test macOS (unit tests)
        run: |
          xcodebuild \
            -project CFApp.xcodeproj \
            -scheme CFApp \
            -destination "platform=macOS" \
            -only-testing:CFAppTests \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build iOS Simulator
        run: |
          xcodebuild \
            -project CFApp.xcodeproj \
            -scheme CFApp \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test iOS Simulator (unit tests)
        run: |
          xcodebuild \
            -project CFApp.xcodeproj \
            -scheme CFApp \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -only-testing:CFAppTests \
            CODE_SIGNING_ALLOWED=NO \
            test
